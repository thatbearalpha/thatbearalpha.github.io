<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/ico" href="/Bear_chance_icon.ico">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gears - Bear Alpha Game</title>
  <link rel="stylesheet" href="https://unpkg.com/98.css">
  <style>
    body {
      background: teal;
      padding: 30px;
      font-family: "MS Sans Serif";
    }
    .window {
      width: 560px;
      margin: auto;
    }
    .center {
      text-align: center;
    }

    /* Card list */
    .list-wrap {
      max-height: 60vh;
      overflow-y: auto;
      border: 2px inset gray;
      background: white;
      padding: 6px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 6px;
      border-bottom: 1px solid #ccc;
    }
    .thumb {
      flex: 0 0 48px;
      height: 48px;
      overflow: hidden;
      background: #ddd;
      border: 1px solid #999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
    .meta {
      flex: 1;
      min-width: 0;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .name {
      font-weight: bold;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .price {
      font-size: 12px;
      color: #444;
    }
    .rarity {
      font-weight: bold;
      font-size: 11px;
      padding: 2px 6px;
      border: 1px solid #999;
    }
    .credit {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }
    .empty {
      padding: 20px;
      text-align: center;
      color: #666;
    }

    .nav-links {
      margin-bottom: 8px;
    }
    .nav-links a {
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="title-bar">
      <div class="title-bar-text">Gears - Bear Alpha Game</div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize"></button>
        <button aria-label="Close"></button>
      </div>
    </div>
    <div class="window-body">
      <p>All gears for Bear Alpha Game, with rarities.</p>

      <div class="nav-links">
        <a href="/bear_game">← Back to Bear Alpha Game</a>
        <a href="/">← Home</a>
      </div>

      <div class="list-wrap" id="list-wrap">
        <div id="list" class="list" aria-live="polite"></div>
      </div>

      <br>
      <div class="center">
        <a href="/bear_game"><button>← Back to Bear Alpha Game</button></a>
        <a href="/"><button>← Home</button></a>
      </div>
    </div>
  </div>

  <template id="card-template">
    <article class="card">
      <div class="thumb"><img loading="lazy" alt=""></div>
      <div class="meta">
        <div class="row">
          <div class="name" title=""></div>
          <div>
            <div class="price"></div>
            <div class="rarity"></div>
          </div>
        </div>
        <div class="credit"></div>
      </div>
    </article>
  </template>

  <script>
    const DATA_PATH = './gears.json';

    function renderCard(item) {
      const tpl = document.getElementById('card-template');
      const node = tpl.content.cloneNode(true);
      const img      = node.querySelector('.thumb img');
      const nameEl   = node.querySelector('.name');
      const priceEl  = node.querySelector('.price');
      const rarityEl = node.querySelector('.rarity');
      const creditEl = node.querySelector('.credit');

      img.src = item.image || '';
      img.alt = item.name + ' thumbnail';
      nameEl.textContent  = item.name || 'Unnamed Gear';
      nameEl.title        = item.name || '';

      if (item.price === "" || item.price === null || item.price === undefined) {
        priceEl.textContent = '';
      } else {
        priceEl.textContent = String(item.price) + ' Quidz';
      }

      if (typeof item.rarity === 'string') {
        rarityEl.textContent   = item.rarity;
        rarityEl.style.background = getColorForRarity(item.rarity);
        rarityEl.style.color      = getContrastColor(rarityEl.style.background);
      } else if (typeof item.rarity === 'object' && item.rarity !== null) {
        rarityEl.textContent      = item.rarity.text || '';
        rarityEl.style.background = item.rarity.color || getColorForRarity(item.rarity.text || '');
        rarityEl.style.color      = item.rarity.textColor || getContrastColor(rarityEl.style.background);
      } else {
        rarityEl.style.display = 'none';
      }

      creditEl.textContent = item.credit ? ('Credit: ' + item.credit) : '';
      return node;
    }

    function getColorForRarity(r) {
      if (!r) return '#ddd';
      const key = r.toLowerCase();
      if (key.includes('common'))    return '#e5e7eb';
      if (key.includes('uncommon'))  return '#86efac';
      if (key.includes('rare'))      return '#93c5fd';
      if (key.includes('epic'))      return '#c084fc';
      if (key.includes('legendary')) return '#fbbf24';
      return '#ddd';
    }

    function getContrastColor(bg) {
      try {
        const c = bg.replace('#', '');
        const r = parseInt(c.substr(0, 2), 16);
        const g = parseInt(c.substr(2, 2), 16);
        const b = parseInt(c.substr(4, 2), 16);
        return (0.2126 * r + 0.7152 * g + 0.0722 * b) > 150 ? '#111' : '#fff';
      } catch (e) { return '#111'; }
    }

    async function loadData() {
      const listEl = document.getElementById('list');
      listEl.innerHTML = '';
      try {
        const res = await fetch(DATA_PATH, { cache: "no-store" });
        if (!res.ok) throw new Error('No gears.json found');
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) {
          listEl.innerHTML = '<div class="empty">No gears found. Edit <code>gears.json</code> to add items.</div>';
          return;
        }
        for (const item of data) {
          listEl.appendChild(renderCard(item));
        }
      } catch (err) {
        listEl.innerHTML = '<div class="empty">Unable to load gears.json. ' + (err.message || '') + '</div>';
        console.error(err);
      }
    }

    loadData();
  </script>
</body>
</html>
