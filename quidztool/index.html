<!doctype html>
<html>
<head>
  <title>Quidz to USD Converter</title>
  <link rel="icon" type="image/ico" href="/Bear_chance_icon.ico">
  <link rel="stylesheet" href="https://unpkg.com/98.css">
  <style>
    body {
      background: teal;
      padding: 30px;
      font-family: "MS Sans Serif";
    }
    .window {
      width: 400px;
      margin: auto;
    }
    .center {
      text-align: center;
    }
    .converter {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .converter label {
      font-weight: bold;
    }
    .converter input {
      width: 100%;
      box-sizing: border-box;
    }
    .result-box {
      border: 2px inset gray;
      background: white;
      padding: 6px 8px;
      min-height: 28px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="title-bar">
      <div class="title-bar-text">Bear (Alpha) Quidz to USD Converter</div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize"></button>
        <button aria-label="Close"></button>
      </div>
    </div>
    <div class="window-body">
      <p>Enter an amount in Quidz to convert to USD:</p>

      <fieldset>
        <legend>Converter</legend>
        <div class="converter">
          <label for="quidz-input">Quidz Amount:</label>
          <input type="number" id="quidz-input" min="0" placeholder="e.g. 1000">
          <button id="convert-btn">Convert &#8594;</button>
          <label>Buying Price:</label>
          <div class="result-box" id="result-buy">&#8212;</div>
          <label>Selling Price:</label>
          <div class="result-box" id="result-sell">&#8212;</div>
        </div>
      </fieldset>

      <br>

      <div class="center">
        <a href="/"><button>&#8592; Back to Home</button></a>
      </div>
    </div>
  </div>

  <script>
    // Math:
    // Step 1 — Quidz to Robux: 37,500 Quidz = 1,600 Robux
    //   Robux = Quidz * (1600 / 37500)
    // Step 2 — Robux to USD:
    //   Buy price:  Robux / 100       (100 Robux = $1)
    //   Sell price: Robux * 0.0038    ($0.0038 per Robux)

    function fmt(val) {
      // Up to 5 decimal places, trim trailing zeros, keep at least 2
      let s = val.toFixed(5);
      let [int, dec] = s.split('.');
      dec = dec.replace(/0+$/, '');
      if (dec.length < 2) dec = dec.padEnd(2, '0');
      return '~$' + int + '.' + dec;
    }

    document.getElementById('convert-btn').addEventListener('click', function () {
      const raw = document.getElementById('quidz-input').value;
      const buyEl  = document.getElementById('result-buy');
      const sellEl = document.getElementById('result-sell');

      if (raw === '' || isNaN(raw) || Number(raw) < 0) {
        buyEl.textContent  = 'Please enter a valid number.';
        sellEl.textContent = '';
        return;
      }

      const quidz  = Number(raw);
      const robux  = quidz * (1600 / 37500);
      const buying  = robux / 100;
      const selling = robux * 0.0038;

      buyEl.textContent  = fmt(buying);
      sellEl.textContent = fmt(selling);
    });
  </script>
</body>
</html>
