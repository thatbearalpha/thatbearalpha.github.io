<!doctype html>
<html>

<head>

  <title>Profiles</title>

  <link rel="icon" type="image/ico" href="/Bear_chance_icon.ico">

  <link rel="stylesheet" href="https://unpkg.com/98.css">

  <style>

    body {

      background: teal;

      padding: 30px;

      font-family: "MS Sans Serif";

    }

    .window {

      width: 550px;

      margin: auto;

    }

    .scrollbox {

      height: 100px;

      overflow-y: scroll;

      border: 2px inset gray;

      background: white;

      padding: 6px;

    }

    .profile {

      display: flex;

      align-items: center;

      gap: 12px;

      padding: 2px;

      border-bottom: 1px solid gray;

    }

    .profile img {

      width: 20px;

      height: 20;

    }

    .profile-name {

      font-weight: bold;

      margin-bottom: 2px;

    }

    .bottom {

      margin-top: 10px;

      text-align: center;

    }

  </style>

</head>

<body>

  <div class="window">

    <div class="title-bar">

      <div class="title-bar-text">

        Profiles.exe

      </div>

      <div class="title-bar-controls">

        <button aria-label="Minimize"></button>

        <button aria-label="Maximize"></button>

        <button aria-label="Close"></button>

      </div>

    </div>

    <div class="window-body">

      <p>

        Find me on these platforms:

      </p>

      <div class="scrollbox">

        <!-- YouTube -->

        <div class="profile">

          <img src="icons/youtube.png">

          <div>

            <div class="profile-name">

              YouTube Channel

            </div>

            <a
              href="https://youtube.com/@thatbearalpha"
              target="_blank"
            >

              Open Profile →

            </a>

          </div>

        </div>

        <!-- Roblox -->

        <div class="profile">

          <img src="icons/roblox.png">

          <div>

            <div class="profile-name">

              Roblox Profile

            </div>

            <a
              href="https://www.roblox.com/users/4903858283/profile"
              target="_blank"
            >

              Open Profile →

            </a>

          </div>

        </div>

        <!-- Wiki -->

        <div class="profile">

          <img src="icons/fandom.png">

          <div>

            <div class="profile-name">

              BEAR Wiki Profile

            </div>

            <a
              href="https://roblox-bear.fandom.com/wiki/User:Thatbearalpha"
              target="_blank"
            >

              Open Profile →

            </a>

          </div>

        </div>

      </div>

      <div class="bottom">

        <a href="/">

          <button>

            ← Back to Home

          </button>

        </a>

      </div>

    </div>

  </div>

</body>

</html>
