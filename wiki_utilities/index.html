<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/ico" href="/Bear_chance_icon.ico">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BEAR Wiki Utilities</title>

  <style>
    html, body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .page {
      max-width: 760px;
      margin: 28px auto;
      padding: 18px;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
    }

    p {
      color: #333;
      margin-bottom: 22px;
    }

    .link {
      display: block;
      color: #2563eb;
      text-decoration: underline;
      font-weight: 600;
      margin: 12px 0;
      transition: color 0.2s;
    }

    .link:hover {
      color: #1e4fc2;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>BEAR Wiki Utilities</h1>
    <p>Quick access to the Roblox BEAR Wiki:</p>

    <!-- Random ANY page -->
    <a class="link" href="https://roblox-bear.fandom.com/wiki/Special:Random" target="_blank">
      Random Wiki Page →
    </a>

    <!-- ⭐ Added BEAR (Alpha) Search Button -->
    <a id="alpha-random" class="link" href="#">
      Random BEAR (Alpha) Page →
    </a>

    <a class="link" href="https://roblox-bear.fandom.com/wiki/Roblox_BEAR_Wiki" target="_blank">
      Wiki Home →
    </a>

    <p><a href="/" class="link">← Back to Home</a></p>
  </div>

  <!-- Full robust script: title search + exact footer phrase + body phrase + session de-dup -->
  <script>
    (function () {
      const wiki = "https://roblox-bear.fandom.com";
      const maxLimit = 200; // usually plenty; API may reduce if necessary

      // Build three API endpoints:
      // 1) title includes (Alpha)
      // 2) exact footer "Reference/s: Bear (Alpha)"
      // 3) body includes "Bear (Alpha)" (broader fallback)
      const apiTitle = `${wiki}/api.php?action=query&list=search&srsearch=${encodeURIComponent('intitle:(Alpha)')}&srlimit=${maxLimit}&format=json&origin=*`;
      const apiFooter = `${wiki}/api.php?action=query&list=search&srsearch=${encodeURIComponent('"Reference/s: Bear (Alpha)"')}&srlimit=${maxLimit}&format=json&origin=*`;
      const apiBody   = `${wiki}/api.php?action=query&list=search&srsearch=${encodeURIComponent('"Bear (Alpha)"')}&srlimit=${maxLimit}&format=json&origin=*`;

      const storageKey = "bearAlphaSeen_v1"; // sessionStorage key for seen titles

      function saveSeen(seenArr) {
        try { sessionStorage.setItem(storageKey, JSON.stringify(seenArr)); } catch (e) { /* ignore */ }
      }
      function loadSeen() {
        try {
          return JSON.parse(sessionStorage.getItem(storageKey) || "[]");
        } catch (e) {
          return [];
        }
      }

      async function fetchJson(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Network response not ok");
        return res.json();
      }

      function mergeAndDedupe(...lists) {
        const map = new Map();
        for (const list of lists) {
          for (const p of list) {
            if (p && p.title) map.set(p.title, p);
          }
        }
        return Array.from(map.values());
      }

      async function getAlphaPages() {
        // Parallel fetch; tolerate individual failures
        const promises = [
          fetchJson(apiTitle).catch(() => null),
          fetchJson(apiFooter).catch(() => null),
          fetchJson(apiBody).catch(() => null),
        ];

        const [resTitle, resFooter, resBody] = await Promise.all(promises);

        const listA = resTitle?.query?.search || [];
        const listB = resFooter?.query?.search || [];
        const listC = resBody?.query?.search || [];

        // Merge and dedupe by title
        return mergeAndDedupe(listA, listB, listC);
      }

      function pickRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      async function openRandomAlpha() {
        try {
          const pages = await getAlphaPages();

          if (!pages.length) {
            // If API returned nothing, fallback to Special:Random
            window.open(`${wiki}/wiki/Special:Random`, "_blank");
            return;
          }

          // Use sessionStorage to avoid repeats during this browser session:
          const seen = loadSeen(); // array of titles
          const allTitles = pages.map(p => p.title);

          // candidates = pages whose title is not in seen
          let candidates = (pages.filter(p => !seen.includes(p.title)));

          // If we've already shown all pages, reset seen (start over)
          if (!candidates.length) {
            saveSeen([]); // clear seen
            candidates = pages.slice();
          }

          const picked = pickRandom(candidates);
          if (!picked || !picked.title) {
            window.open(`${wiki}/wiki/Special:Random`, "_blank");
            return;
          }

          // Mark as seen
          seen.push(picked.title);
          // keep seen size reasonable (not necessary but prevents huge growth)
          if (seen.length > 1000) seen.splice(0, seen.length - 1000);
          saveSeen(seen);

          // Open the picked page
          const urlTitle = encodeURIComponent(picked.title.replace(/ /g, "_"));
          window.open(`${wiki}/wiki/${urlTitle}`, "_blank");

        } catch (err) {
          // if anything fails, fallback to Special:Random
          console.error("Random Alpha failed:", err);
          window.open(`${wiki}/wiki/Special:Random`, "_blank");
        }
      }

      document.getElementById("alpha-random").addEventListener("click", (e) => {
        e.preventDefault();
        openRandomAlpha();
      });
    })();
  </script>
</body>
</html>
