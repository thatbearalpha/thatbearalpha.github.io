<!doctype html>
<html lang="en">
<head>
  <link rel="icon" type="image/ico" href="/Bear_chance_icon.ico">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BEAR Wiki Utilities</title>

  <style>
    html, body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    .page {
      max-width: 760px;
      margin: 28px auto;
      padding: 18px;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
    }

    p {
      color: #333;
      margin-bottom: 22px;
    }

    .link {
      display: block;
      color: #2563eb;
      text-decoration: underline;
      font-weight: 600;
      margin: 12px 0;
      transition: color 0.2s;
    }

    .link:hover {
      color: #1e4fc2;
    }
  </style>
</head>

<body>
  <div class="page">
    <h1>BEAR Wiki Utilities</h1>
    <p>Quick access to the Roblox BEAR Wiki:</p>

    <!-- Random ANY page -->
    <a class="link" href="https://roblox-bear.fandom.com/wiki/Special:Random" target="_blank">
      Random Wiki Page →
    </a>

    <!-- ⭐ Added BEAR (Alpha) Search Button -->
    <a id="alpha-random" class="link" href="#">
      Random BEAR (Alpha) Page →
    </a>

    <a class="link" href="https://roblox-bear.fandom.com/wiki/Roblox_BEAR_Wiki" target="_blank">
      Wiki Home →
    </a>

    <p><a href="/" class="link">← Back to Home</a></p>
  </div>

  <!-- ⭐ Script for filtering Alpha pages -->
  <script>
    document.getElementById("alpha-random").addEventListener("click", async (e) => {
      e.preventDefault();

      const wiki = "https://roblox-bear.fandom.com";
      const api =
        wiki +
        "/api.php?action=query&list=search&srsearch=%22Bear%20(Alpha)%22&srlimit=50&format=json&origin=*";

      try {
        const res = await fetch(api);
        const data = await res.json();
        const results = data.query?.search || [];

        if (!results.length) {
          window.open(wiki + "/wiki/Special:Random", "_blank");
          return;
        }

        const page = results[Math.floor(Math.random() * results.length)];
        const urlTitle = encodeURIComponent(page.title.replace(/ /g, "_"));
        window.open(`${wiki}/wiki/${urlTitle}`, "_blank");
        
      } catch {
        // Fallback
        window.open("https://roblox-bear.fandom.com/wiki/Special:Random", "_blank");
      }
    });
  </script>
</body>
</html>
